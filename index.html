<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>BNX 단독 상장주 소개</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #000;
      --text: #fff;
      --text-title: rgba(255, 255, 255, 0.95);
      --text-desc: rgba(255, 255, 255, 0.45);
      --text-sub: rgba(255, 255, 255, 0.5);
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-border-hover: rgba(255, 255, 255, 0.18);
      --glass-inset: rgba(255, 255, 255, 0.08);
      --glass-inset-hover: rgba(255, 255, 255, 0.12);
      --glass-shadow: rgba(0, 0, 0, 0.4);
      --glass-shadow-hover: rgba(0, 0, 0, 0.5);
      --glow-1: rgba(255, 100, 50, 0.08);
      --glow-2: rgba(100, 50, 255, 0.07);
      --glow-3: rgba(180, 255, 0, 0.05);
      --arrow-bg: rgba(255, 255, 255, 0.08);
      --arrow-border: rgba(255, 255, 255, 0.15);
      --arrow-color: rgba(255, 255, 255, 0.8);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f0f2f8;
        --text: #1a1a2e;
        --text-title: rgba(20, 20, 40, 0.95);
        --text-desc: rgba(20, 20, 40, 0.55);
        --text-sub: rgba(20, 20, 40, 0.45);
        --glass-bg: rgba(255, 255, 255, 0.55);
        --glass-border: rgba(255, 255, 255, 0.8);
        --glass-border-hover: rgba(200, 210, 255, 0.9);
        --glass-inset: rgba(255, 255, 255, 0.9);
        --glass-inset-hover: rgba(255, 255, 255, 1);
        --glass-shadow: rgba(100, 120, 200, 0.12);
        --glass-shadow-hover: rgba(100, 120, 200, 0.2);
        --glow-1: rgba(255, 120, 60, 0.12);
        --glow-2: rgba(120, 80, 255, 0.1);
        --glow-3: rgba(100, 200, 50, 0.08);
        --arrow-bg: rgba(255, 255, 255, 0.7);
        --arrow-border: rgba(180, 190, 220, 0.6);
        --arrow-color: rgba(30, 40, 80, 0.8);
      }
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, var(--glow-1) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 60%, var(--glow-2) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 50% 90%, var(--glow-3) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      transition: background 0.4s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(48px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(40px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .animate-in {
      opacity: 0;
      animation: slideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .header.animate-in {
      animation-delay: 0.1s;
    }

    .glass-card.animate-in:nth-child(1) {
      animation-delay: 0.25s;
    }

    .glass-card.animate-in:nth-child(2) {
      animation-delay: 0.4s;
    }

    .glass-card.animate-in:nth-child(3) {
      animation-delay: 0.55s;
    }

    .slide-2 .info-animate {
      opacity: 0;
    }

    .slide-2.active .info-heading {
      animation: slideInRight 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
    }

    .slide-2.active .info-image-wrap {
      animation: slideInRight 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    .slide-2.active .info-disclaimer {
      animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
    }

    @media (prefers-reduced-motion: reduce) {
      .animate-in,
      .slide-2 .info-animate {
        opacity: 1;
        animation: none;
        transform: none;
      }
    }

    .slider-viewport {
      position: relative;
      z-index: 1;
      overflow: hidden;
      width: 100%;
    }

    .slider-track {
      display: flex;
      width: 200%;
      transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .slider-track.at-slide-2 {
      transform: translateX(-50%);
    }

    .slide {
      width: 50%;
      flex-shrink: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px 8px;
    }

    .header {
      display: flex;
      justify-content: center;
      margin-bottom: 64px;
    }

    .slide-2 .header {
      margin-bottom: 32px;
    }

    .header img {
      max-width: 94px;
      width: 100%;
      height: auto;
    }

    .logo-dark { display: block; }
    .logo-light { display: none; }

    @media (prefers-color-scheme: light) {
      .logo-dark { display: none; }
      .logo-light { display: block; }
    }

    .sections {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .glass-card {
      display: flex;
      align-items: center;
      gap: 32px;
      padding: 28px 32px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 8px 32px var(--glass-shadow),
        inset 0 1px 0 var(--glass-inset);
      transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.4s ease;
    }

    .glass-card:hover {
      border-color: var(--glass-border-hover);
      box-shadow:
        0 12px 40px var(--glass-shadow-hover),
        inset 0 1px 0 var(--glass-inset-hover);
    }

    .glass-card__image {
      flex-shrink: 0;
      width: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glass-card__image img {
      max-width: 100%;
      height: auto;
      object-fit: contain;
    }

    .glass-card__content {
      flex: 1;
      min-width: 0;
    }

    .glass-card__title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      color: var(--text-title);
      transition: color 0.4s ease;
    }

    .glass-card__desc {
      font-size: 0.8rem;
      color: var(--text-desc);
      line-height: 1.7;
      transition: color 0.4s ease;
    }

    .info-heading {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-title);
      margin-bottom: 32px;
      letter-spacing: -0.02em;
    }

    .info-image-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .info-image-wrap img {
      max-width: 100%;
      width: 100%;
      max-width: 720px;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 12px 40px var(--glass-shadow);
    }

    .info-disclaimer {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-sub);
      line-height: 1.6;
      padding: 0 16px;
    }

    .slide-nav {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 8px 24px 40px;
    }

    .nav-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--arrow-border);
      background: var(--arrow-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--arrow-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, background 0.3s ease, opacity 0.3s ease;
      box-shadow: 0 4px 16px var(--glass-shadow);
    }

    .nav-btn:hover {
      transform: scale(1.08);
    }

    .nav-btn:disabled {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.8);
    }

    .nav-btn svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 600px) {
      .container {
        padding: 40px 16px 4px;
      }

      .header {
        margin-bottom: 40px;
      }

      .slide-2 .header {
        margin-bottom: 24px;
      }

      .header img {
        max-width: 54px;
      }

      .glass-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
        padding: 24px;
      }

      .glass-card__image {
        width: 96px;
      }

      .glass-card__title {
        font-size: 0.95rem;
      }

      .glass-card__desc {
        font-size: 0.75rem;
      }

      .info-heading {
        font-size: 1.05rem;
        margin-bottom: 24px;
      }

      .info-disclaimer {
        font-size: 0.75rem;
      }

      .slide-nav {
        padding: 6px 16px 28px;
      }

      .nav-btn {
        width: 44px;
        height: 44px;
      }
    }
  </style>
</head>
<body>
  <div class="slider-viewport">
    <div class="slider-track" id="sliderTrack">
      <div class="slide slide-1">
        <div class="container">
          <header class="header animate-in">
            <img class="logo-dark" src="logo.png" alt="BNX Band Exchange">
            <img class="logo-light" src="logoblue.png" alt="BNX Band Exchange">
          </header>

          <main class="sections">
            <section class="glass-card animate-in">
              <div class="glass-card__image">
                <img src="apextechnology.png" alt="에이펙스 테크놀로지">
              </div>
              <div class="glass-card__content">
                <h2 class="glass-card__title">에이펙스 테크놀로지</h2>
                <p class="glass-card__desc">반도체 산업을 필두로 한 가전/전자기기 제조 기업</p>
              </div>
            </section>

            <section class="glass-card animate-in">
              <div class="glass-card__image">
                <img src="nextplaygames.png" alt="넥스트플레이 게임즈">
              </div>
              <div class="glass-card__content">
                <h2 class="glass-card__title">넥스트플레이 게임즈</h2>
                <p class="glass-card__desc">국내 유일무이 모바일 게임 개발사</p>
              </div>
            </section>

            <section class="glass-card animate-in">
              <div class="glass-card__image">
                <img src="qmenter.png" alt="퀀텀뮤직 엔터테인먼트">
              </div>
              <div class="glass-card__content">
                <h2 class="glass-card__title">퀀텀뮤직 엔터테인먼트</h2>
                <p class="glass-card__desc">혁신적인 글로벌 엔터테인먼트 기업</p>
              </div>
            </section>
          </main>
        </div>
      </div>

      <div class="slide slide-2" id="slide2">
        <div class="container">
          <header class="header">
            <img class="logo-dark" src="logo.png" alt="BNX Band Exchange">
            <img class="logo-light" src="logoblue.png" alt="BNX Band Exchange">
          </header>

          <h2 class="info-heading info-animate">BNX 자체 애플리케이션 출시 예정</h2>

          <div class="info-image-wrap info-animate">
            <img src="info.png" alt="BNX 앱 미리보기">
          </div>

          <p class="info-disclaimer info-animate">개발 중인 화면이며, 최종 릴리즈 디자인은 변경될 수 있습니다.</p>
        </div>
      </div>
    </div>
  </div>

  <nav class="slide-nav">
    <button class="nav-btn nav-prev" id="prevBtn" aria-label="이전" disabled>
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nav-btn nav-next" id="nextBtn" aria-label="다음">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </nav>

  <script>
    const track = document.getElementById('sliderTrack');
    const slide2 = document.getElementById('slide2');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    let current = 0;

    function goTo(index) {
      current = index;
      track.classList.toggle('at-slide-2', current === 1);
      slide2.classList.toggle('active', current === 1);
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === 1;
    }

    prevBtn.addEventListener('click', () => goTo(0));
    nextBtn.addEventListener('click', () => goTo(1));

    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) < 50) return;
      if (diff > 0 && current === 0) goTo(1);
      if (diff < 0 && current === 1) goTo(0);
    }, { passive: true });
  </script>
</body>
</html>
