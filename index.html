<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>Band Exchange</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f0f2f8;
      --text: #1a1a2e;
      --text-title: rgba(20, 20, 40, 0.95);
      --text-desc: rgba(20, 20, 40, 0.55);
      --text-sub: rgba(20, 20, 40, 0.45);
      --glass-bg: rgba(255, 255, 255, 0.55);
      --glass-border: rgba(255, 255, 255, 0.8);
      --glass-border-hover: rgba(200, 210, 255, 0.9);
      --glass-inset: rgba(255, 255, 255, 0.9);
      --glass-inset-hover: rgba(255, 255, 255, 1);
      --glass-shadow: rgba(100, 120, 200, 0.12);
      --glass-shadow-hover: rgba(100, 120, 200, 0.2);
      --glow-1: rgba(255, 120, 60, 0.12);
      --glow-2: rgba(120, 80, 255, 0.1);
      --glow-3: rgba(100, 200, 50, 0.08);
      --header-height: 88px;
    }

    html {
      height: 100%;
    }

    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      line-height: 1.6;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, var(--glow-1) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 60%, var(--glow-2) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 50% 90%, var(--glow-3) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(48px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header-fixed {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      height: var(--header-height);
      background: rgba(240, 242, 248, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.6);
    }

    .header-fixed img {
      max-width: 168px;
      width: 100%;
      height: auto;
    }

    .scroll-container {
      position: relative;
      z-index: 1;
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .screen {
      min-height: 100vh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: calc(var(--header-height) + 20px) 24px 40px;
    }

    .container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    .animate-in {
      opacity: 0;
      animation: slideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .screen-1 .page-heading { animation-delay: 0.1s; }
    .screen-1 .glass-card:nth-child(1) { animation-delay: 0.2s; }
    .screen-1 .glass-card:nth-child(2) { animation-delay: 0.35s; }
    .screen-1 .glass-card:nth-child(3) { animation-delay: 0.5s; }

    .screen-2 .reveal,
    .screen-3 .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .screen-2.visible .reveal:nth-child(1),
    .screen-3.visible .reveal:nth-child(1) {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 0.1s;
    }

    .screen-2.visible .reveal:nth-child(2),
    .screen-3.visible .reveal:nth-child(2) {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 0.25s;
    }

    .screen-2.visible .reveal:nth-child(3),
    .screen-3.visible .reveal:nth-child(3) {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 0.4s;
    }

    .screen-3.visible .reveal:nth-child(4) {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 0.55s;
    }

    .screen-3.visible .reveal:nth-child(5) {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 0.7s;
    }

    .screen-3.visible .reveal:nth-child(6) {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 0.85s;
    }

    @media (prefers-reduced-motion: reduce) {
      .animate-in,
      .screen-2 .reveal,
      .screen-3 .reveal {
        opacity: 1;
        animation: none;
        transform: none;
        transition: none;
      }
    }

    .page-heading,
    .info-heading,
    .event-heading {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-title);
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }

    .event-heading {
      margin-bottom: 8px;
    }

    .event-subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-desc);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .event-image-link {
      display: block;
      max-width: 480px;
      margin: 0 auto 12px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 40px var(--glass-shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .event-image-link:hover {
      transform: scale(1.02);
      box-shadow: 0 16px 48px var(--glass-shadow-hover);
    }

    .event-image-link img {
      display: block;
      width: 100%;
      height: auto;
    }

    .event-link-hint {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-sub);
    }

    .community-btn-wrap {
      display: flex;
      justify-content: center;
      margin-top: 28px;
    }

    .community-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 28px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-title);
      text-decoration: none;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 8px 32px var(--glass-shadow),
        inset 0 1px 0 var(--glass-inset);
      transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
    }

    .community-btn:hover {
      border-color: var(--glass-border-hover);
      box-shadow:
        0 12px 40px var(--glass-shadow-hover),
        inset 0 1px 0 var(--glass-inset-hover);
      transform: translateY(-1px);
    }

    .sections {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .glass-card {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 16px 32px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 8px 32px var(--glass-shadow),
        inset 0 1px 0 var(--glass-inset);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-card:hover {
      border-color: var(--glass-border-hover);
      box-shadow:
        0 12px 40px var(--glass-shadow-hover),
        inset 0 1px 0 var(--glass-inset-hover);
    }

    .glass-card__image {
      flex-shrink: 0;
      width: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glass-card__image img {
      max-width: 100%;
      height: auto;
      object-fit: contain;
    }

    .glass-card__content {
      flex: 1;
      min-width: 0;
    }

    .glass-card__title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
      color: var(--text-title);
    }

    .glass-card__desc {
      font-size: 0.8rem;
      color: var(--text-desc);
      line-height: 1.5;
    }

    .info-image-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .info-image-wrap img {
      max-width: 100%;
      width: 100%;
      max-width: 720px;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 12px 40px var(--glass-shadow);
    }

    .info-disclaimer {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-sub);
      line-height: 1.6;
      padding: 0 16px;
    }

    .scroll-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      color: var(--text-sub);
      font-size: 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    .scroll-hint.hidden {
      opacity: 0;
    }

    .scroll-hint svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      animation: bounce 1.8s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    @media (max-width: 600px) {
      :root {
        --header-height: 72px;
      }

      .header-fixed img {
        max-width: 96px;
      }

      .screen {
        padding: calc(var(--header-height) + 16px) 16px 32px;
      }

      .page-heading,
      .info-heading,
      .event-heading {
        font-size: 1.05rem;
        margin-bottom: 16px;
      }

      .event-heading {
        margin-bottom: 6px;
      }

      .event-subtitle {
        font-size: 0.8rem;
        margin-bottom: 16px;
      }

      .community-btn {
        font-size: 0.8rem;
        padding: 10px 22px;
      }

      .community-btn-wrap {
        margin-top: 20px;
      }

      .glass-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 20px;
      }

      .glass-card__image {
        width: 96px;
      }

      .glass-card__title {
        font-size: 0.95rem;
      }

      .glass-card__desc {
        font-size: 0.75rem;
      }

      .info-disclaimer {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <header class="header-fixed">
    <img src="logoblue.png" alt="Band Exchange">
  </header>

  <main class="scroll-container" id="scrollContainer">
    <section class="screen screen-1">
      <div class="container">
        <h2 class="page-heading animate-in">BNX 단독 상장주 소개</h2>

        <div class="sections">
          <section class="glass-card animate-in">
            <div class="glass-card__image">
              <img src="apextechnology.png" alt="에이펙스 테크놀로지">
            </div>
            <div class="glass-card__content">
              <h2 class="glass-card__title">에이펙스 테크놀로지</h2>
              <p class="glass-card__desc">반도체 산업을 필두로 한 전자기기 제조 기업</p>
            </div>
          </section>

          <section class="glass-card animate-in">
            <div class="glass-card__image">
              <img src="nextplaygames.png" alt="넥스트플레이 게임즈">
            </div>
            <div class="glass-card__content">
              <h2 class="glass-card__title">넥스트플레이 게임즈</h2>
              <p class="glass-card__desc">국내 유일무이 PC/콘솔 게임 개발사</p>
            </div>
          </section>

          <section class="glass-card animate-in">
            <div class="glass-card__image">
              <img src="qmenter.png" alt="퀀텀뮤직 엔터테인먼트">
            </div>
            <div class="glass-card__content">
              <h2 class="glass-card__title">퀀텀뮤직 엔터테인먼트</h2>
              <p class="glass-card__desc">혁신적인 글로벌 엔터테인먼트 기업</p>
            </div>
          </section>
        </div>
      </div>
    </section>

    <section class="screen screen-2" id="screen2">
      <div class="container">
        <h2 class="info-heading reveal">BNX 자체 개발 웹 서비스 출시 예정</h2>

        <div class="info-image-wrap reveal">
          <img src="info.png" alt="BNX 웹 서비스 미리 보기">
        </div>

        <p class="info-disclaimer reveal">개발 중인 화면이며, 최종 릴리즈 시 변경될 수 있습니다.</p>
      </div>
    </section>

    <section class="screen screen-3" id="screen3">
      <div class="container">
        <h2 class="event-heading reveal">선공개 이벤트</h2>

        <p class="event-subtitle reveal">피드용 이미지 틀 생성기입니다. 개장 전 자유롭게 이용해 보세요!</p>

        <a class="event-image-link reveal" href="https://bandexchange.github.io/createImage/" target="_blank" rel="noopener noreferrer">
          <img src="cardImage.png" alt="피드용 이미지 틀 생성기">
        </a>

        <p class="event-link-hint reveal">사진 클릭 시 이동</p>

        <div class="community-btn-wrap reveal">
          <a class="community-btn" href="https://band.us/n/a3a4b6Aao8ufl" target="_blank" rel="noopener noreferrer">커뮤니티로 이동하기</a>
        </div>
      </div>
    </section>
  </main>

  <div class="scroll-hint" id="scrollHint">
    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    <span>스크롤</span>
  </div>

  <script>
    const scrollContainer = document.getElementById('scrollContainer');
    const screen2 = document.getElementById('screen2');
    const screen3 = document.getElementById('screen3');
    const scrollHint = document.getElementById('scrollHint');

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      },
      { threshold: 0.3 }
    );
    observer.observe(screen2);
    observer.observe(screen3);

    scrollContainer.addEventListener('scroll', () => {
      scrollHint.classList.toggle('hidden', scrollContainer.scrollTop > 50);
    }, { passive: true });
  </script>
</body>
</html>
